novel:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: novel
    username: username
    password: password
  jwt:
    # jwt签名加密时使用的密钥
    secret-key: awsl
    # jwt过期时间 2小时 (=2 * 60 * 60 * 1000)
    ttl: 7200000
  front:
    ip:
      - http://localhost:3000
      - http://localhost:5173
  oss:
    endpoint: endpoint
    bucket-name: backetname
    region: region
  exclude:
    path:
      - /user/login
      - /user/register
      - /user/info
      - /news/**
      - /home/**
      - /book/category
      - /book/all
      - /book/info/{id}
      - /book/chapter
      - /book/random
      - /book/rank
      - /book/content
      - /book/search
      - /book/state
      - /captcha
      - /comment/top
      - /comment/child

sa-token:
  # jwt秘钥
  jwt-secret-key: key

es:
  host: host
  port: 9200